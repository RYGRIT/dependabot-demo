##############################################################################
# Dependabot Configuration Demo
#
# This configuration is intentionally minimal:
#   1. Keep GitHub Actions updates enabled
#   2. Ignore all Dependabot updates under /playground/*
##############################################################################

version: 2

updates:
  #==========================================================================
  # GitHub Actions updates
  #==========================================================================
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  #==========================================================================
  # Ignore all updates for all manifests under /playground/*
  #==========================================================================
  - package-ecosystem: npm
    directories:
      - "/playground/*"
    schedule:
      interval: weekly
    ignore:
      - dependency-name: "*"         # Ignore all updates for all dependencies
    labels:
      - "dependencies"
